<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f4e78">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/style.css">
  <title>Складской учет</title>
</head>
<body>
  <header class="top">
    <div class="title-row">
      <div>
        <h1>Складской учет</h1>
        <p class="subtitle">Быстрый ввод, журнал и статистика по смене</p>
      </div>
    </div>
    <nav>
      <a href="/" data-nav="/">Ввод</a>
      <a href="/live" data-nav="/live">Сейчас</a>
      <a href="/journal" data-nav="/journal">Журнал</a>
      <a href="/stats" data-nav="/stats">Статистика</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    const path = window.location.pathname;
    document.querySelectorAll("[data-nav]").forEach((a) => {
      const p = a.getAttribute("data-nav");
      if ((p === "/" && path === "/") || (p !== "/" && path.startsWith(p))) {
        a.classList.add("active");
      }
    });
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js");
    }
  </script>
</body>
</html>
